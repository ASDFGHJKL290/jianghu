<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>预生成 vs 实时生成 - 效果对比</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:#0a0a14;color:#c8c0b8;min-height:100vh}
.header{text-align:center;padding:32px 16px 24px}
.header h1{font-size:1.6em;color:#f0d78c;margin-bottom:8px}
.header p{color:#807060;font-size:.85em}

.container{max-width:1200px;margin:0 auto;padding:0 20px 60px}

.controls{display:flex;gap:12px;align-items:center;justify-content:center;margin-bottom:32px;flex-wrap:wrap}
.controls button{padding:10px 24px;border-radius:8px;font-size:.95em;cursor:pointer;border:1px solid #8a6d3b44;background:linear-gradient(135deg,#2a1f3a,#141425);color:#c0b0a0;transition:all .3s}
.controls button:hover{color:#f0d78c;border-color:#8a6d3b88}
.controls button:disabled{opacity:.4;cursor:not-allowed}
.controls .hint{color:#807060;font-size:.8em}

#loading{display:none;text-align:center;padding:40px}
#loading.active{display:block}
.spinner{width:36px;height:36px;border:3px solid #8a6d3b33;border-top-color:#f0d78c;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* 结论条 */
.verdict{background:linear-gradient(135deg,#141425,#1a1025);border:1px solid #6ab06a55;border-radius:12px;padding:20px 28px;margin-bottom:28px;text-align:center}
.verdict.bad{border-color:#c0606055}
.verdict h2{font-size:1.3em;margin-bottom:6px}
.verdict h2.win{color:#6ab06a}
.verdict h2.lose{color:#c06060}
.verdict .sub{color:#908880;font-size:.85em}

/* 双栏对比 */
.columns{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px}
@media(max-width:800px){.columns{grid-template-columns:1fr}}

.column-card{border-radius:14px;overflow:hidden;border:2px solid}
.column-card.realtime{border-color:#c0606055;background:linear-gradient(180deg,#1a0d0d,#141425)}
.column-card.pregen{border-color:#6ab06a55;background:linear-gradient(180deg,#0d1a0d,#141425)}

.column-card .top{padding:20px 24px 12px}
.column-card .top h3{font-size:1.15em;margin-bottom:6px}
.column-card.realtime .top h3{color:#e08080}
.column-card.pregen .top h3{color:#80c080}
.column-card .top .desc{font-size:.82em;color:#908880;line-height:1.6}

/* 矛盾计数 */
.contradiction-badge{display:flex;align-items:center;gap:12px;padding:14px 24px;border-top:1px solid #8a6d3b22}
.contradiction-badge .big-num{font-size:2.4em;font-weight:bold}
.contradiction-badge .big-num.red{color:#e06060}
.contradiction-badge .big-num.green{color:#6ab06a}
.contradiction-badge .big-num.gray{color:#706860}
.contradiction-badge .label-text{font-size:.85em;color:#908880}

/* 矛盾详情 */
.detail-list{padding:0 24px 16px}
.detail-list .item{background:#00000022;border-radius:8px;padding:10px 14px;margin-bottom:6px;font-size:.84em;color:#c06060;display:flex;align-items:flex-start;gap:8px}
.detail-list .item .icon{flex-shrink:0}
.no-issue{text-align:center;padding:20px;color:#6ab06a;font-size:.9em}

/* 事件网格 */
.events-grid{padding:0 24px 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
.event-chip{background:#00000022;border:1px solid #8a6d3b22;border-radius:8px;padding:10px 12px;font-size:.8em}
.event-chip .e-title{font-weight:bold;color:#c8c0b8;margin-bottom:3px}
.event-chip .e-npc{color:#8a6d3b;font-size:.85em}
.event-chip .e-desc{color:#908880;font-size:.9em;margin-top:3px}
.event-chip .e-loc{color:#706860;font-size:.78em;margin-top:3px}

/* 优势/劣势列表 */
.benefits{padding:0 24px 20px}
.benefits .b-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;font-size:.82em;color:#908880}
.benefits .b-item.good{color:#80c080}
.benefits .b-item.bad{color:#c06060}

/* 说明 */
.note{background:#141425;border:1px solid #8a6d3b22;border-radius:12px;padding:20px;font-size:.85em;color:#908880;line-height:1.8;margin-top:12px}
.note ul{padding-left:18px;margin:8px 0}
.note li{margin:4px 0}
.note code{color:#c0b070;background:#00000033;padding:1px 5px;border-radius:3px;font-size:.92em}

/* 计时 */
.timer{text-align:center;color:#706860;font-size:.8em;margin-top:12px}

/* 轮次详情 */
.rounds-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:14px}
.round-card{background:#141425;border:1px solid #8a6d3b22;border-radius:12px;padding:16px}
.round-card.worse{border-color:#8a4a4a55}
.round-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.round-num{font-weight:bold;color:#f0d78c;font-size:1em}
.round-npcs{color:#706860;font-size:.78em;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right}
.round-stats{display:flex;align-items:center;gap:6px;margin-bottom:12px}
.round-stat{flex:1;text-align:center;padding:8px;border-radius:8px;background:#00000022}
.round-stat .stat-label{display:block;font-size:.72em;color:#706860;margin-bottom:4px}
.round-stat .stat-val{font-weight:bold;font-size:1.2em}
.round-stat .stat-val.good{color:#6ab06a}
.round-stat .stat-val.bad{color:#c06060}
.round-arrow{flex:0 0 36px;text-align:center;font-size:1.4em}
.round-arrow.win{color:#6ab06a}
.round-arrow.lose{color:#c06060}
.round-details{padding:8px 0 4px;border-top:1px solid #8a6d3b11}
.rd-label{font-size:.78em;color:#706860;margin-bottom:4px}
.rd-item{font-size:.78em;color:#c06060;padding:3px 0 3px 8px;border-left:2px solid #c0606044;margin-bottom:2px;line-height:1.5}
.rd-item.bad{color:#c08060}

.hidden{display:none}
</style>
</head>
<body>

<div class="header">
  <h1>预生成 vs 实时生成 - 一致性对比</h1>
  <p>对比「隔离实时生成(模拟传统方案)」和「全局预生成(你的方案)」的 NPC 事件矛盾率</p>
</div>

<div class="container">
  <div class="controls">
    <button id="runBtn" onclick="run()">运行对比 (4 NPC x 3 事件)</button>
    <span class="hint">约需 30-60 秒，涉及多次 LLM 调用</span>
  </div>

  <div id="loading"><div class="spinner"></div><p>正在生成并检测矛盾...</p></div>
  <div id="error" class="hidden" style="text-align:center;color:#c06060;padding:20px"></div>
  <div id="timer" class="timer hidden"></div>

  <div id="verdict" class="hidden"></div>
  <div id="columns" class="columns hidden"></div>
  <div id="rounds" class="hidden" style="margin-bottom:28px"></div>
  <div id="note" class="note hidden"></div>
</div>

<script>
const API = '/api/events/compare_modes';

function showLoading(v){
  document.getElementById('loading').classList.toggle('active',v);
  document.getElementById('runBtn').disabled = v;
  if(v){
    document.getElementById('verdict').classList.add('hidden');
    document.getElementById('columns').classList.add('hidden');
    document.getElementById('note').classList.add('hidden');
    document.getElementById('timer').classList.add('hidden');
    document.getElementById('rounds').classList.add('hidden');
    document.getElementById('error').classList.add('hidden');
  }
}

async function run(){
  showLoading(true);
  try{
    const resp = await fetch(`${API}?npc_count=4&events_per=3`);
    const data = await resp.json();
    if(data.error){ showError(data.error); return; }
    render(data);
  }catch(e){
    showError('请求失败: ' + e.message);
  }
  showLoading(false);
}

function showError(msg){
  const el = document.getElementById('error');
  el.classList.remove('hidden');
  el.textContent = msg;
  showLoading(false);
}

function render(data){
  const s = data.summary;
  const iso = s.isolated;
  const glo = s.global;
  const pregenBetter = glo.total_contradictions < iso.total_contradictions;

  // 计时
  document.getElementById('timer').classList.remove('hidden');
  document.getElementById('timer').textContent =
    `总耗时: ${data.elapsed_sec}秒 | ${data.rounds}轮 × ${data.total_events_all}事件 | NPC池: ${(data.npcs_all||[]).join(', ')}`;

  // 结论条
  const v = document.getElementById('verdict');
  v.classList.remove('hidden');
  v.className = 'verdict' + (pregenBetter ? '' : ' bad');
  v.innerHTML = `
    <h2 class="${pregenBetter ? 'win' : 'lose'}">
      ${pregenBetter
        ? `预生成效果更好：矛盾减少 ${s.delta} 处（${
            iso.total_contradictions > 0
              ? Math.round(s.delta / iso.total_contradictions * 100) : 0
          }%）`
        : `隔离生成: ${iso.total_contradictions}处 | 预生成: ${glo.total_contradictions}处`}
    </h2>
    <div class="sub">
      确定性规则检测（同NPC重叠时段在不同地点出现）·
      隔离模式均 ${iso.avg_per_round} 处/轮 ·
      全局模式均 ${glo.avg_per_round} 处/轮
    </div>
  `;

  // 双栏
  const cols = document.getElementById('columns');
  cols.classList.remove('hidden');

  function h(str){
    if(!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // 矛盾详情列表
  function detailHTML(details){
    if(!details || details.length === 0) return '<div class="no-issue">未发现时空矛盾</div>';
    return details.map(d => `
      <div class="item"><span class="icon">&#x26A0;</span><span>${h(d)}</span></div>
    `).join('');
  }

  // 事件网格
  function eventsHTML(events){
    if(!events || !events.length) return '<div style="padding:16px;color:#706860">无事件</div>';
    return events.slice(0, 6).map(e => `
      <div class="event-chip">
        <div class="e-title">${h(e.title||'无标题')}</div>
        <div class="e-npc">${h(e.from_npc||'')} · ${e.day_range ? `${e.day_range[0]}-${e.day_range[1]}天` : ''}</div>
        <div class="e-desc">${h(e.description||'')}</div>
        <div class="e-loc">${h((e.related_locations||[]).join(', ')||'无地点')}</div>
      </div>
    `).join('');
  }

  const isoColor = iso.total_contradictions === 0 ? 'gray' : 'red';
  const gloColor = glo.total_contradictions === 0 ? 'green' : 'red';

  cols.innerHTML = `
    <div class="column-card realtime">
      <div class="top">
        <h3>隔离生成（模拟实时）</h3>
        <div class="desc">每个NPC独立调用LLM，互不知晓彼此事件。共${data.rounds}轮，${iso.total_contradictions}处矛盾。</div>
      </div>
      <div class="contradiction-badge">
        <div class="big-num ${isoColor}">${iso.total_contradictions}</div>
        <div class="label-text">处矛盾 / ${iso.avg_per_round} 处每轮</div>
      </div>
      <div class="detail-list">${detailHTML(iso.details)}</div>
      <div class="benefits">
        <div class="b-item bad"><span>&#x2716;</span><span>各NPC不知其他NPC事件 → 易冲突</span></div>
        <div class="b-item bad"><span>&#x2716;</span><span>每次实时生成增加延迟</span></div>
        <div class="b-item bad"><span>&#x2716;</span><span>不同玩家触发结果不一致</span></div>
      </div>
    </div>
    <div class="column-card pregen">
      <div class="top">
        <h3>预生成（全局协调）</h3>
        <div class="desc">按序生成，后生成NPC能看到已生成事件。共${data.rounds}轮，${glo.total_contradictions}处矛盾。</div>
      </div>
      <div class="contradiction-badge">
        <div class="big-num ${gloColor}">${glo.total_contradictions}</div>
        <div class="label-text">处矛盾 / ${glo.avg_per_round} 处每轮</div>
      </div>
      <div class="detail-list">${detailHTML(glo.details)}</div>
      <div class="benefits">
        <div class="b-item good"><span>&#x2714;</span><span>全局上下文避免NPC间矛盾</span></div>
        <div class="b-item good"><span>&#x2714;</span><span>生成一次后零延迟复用</span></div>
        <div class="b-item good"><span>&#x2714;</span><span>所有玩家看到一致的故事</span></div>
      </div>
    </div>
  `;

  // 各轮详情（可折叠）
  const roundsEl = document.getElementById('rounds');
  roundsEl.classList.remove('hidden');

  let roundHTML = `<div class="rounds-grid">`;
  (data.rounds_detail || []).forEach(r => {
    const isoR = r.isolated;
    const gloR = r.global;
    const better = gloR.contradiction_count < isoR.contradiction_count;
    roundHTML += `
      <div class="round-card ${better ? '' : 'worse'}">
        <div class="round-header">
          <span class="round-num">第 ${r.round} 轮</span>
          <span class="round-npcs">${(r.npcs||[]).join(' · ')}</span>
        </div>
        <div class="round-stats">
          <div class="round-stat iso">
            <span class="stat-label">隔离生成</span>
            <span class="stat-val ${isoR.contradiction_count > 0 ? 'bad' : 'good'}">${isoR.contradiction_count} 处</span>
          </div>
          <div class="round-stat glo">
            <span class="stat-label">预生成</span>
            <span class="stat-val ${gloR.contradiction_count > 0 ? 'bad' : 'good'}">${gloR.contradiction_count} 处</span>
          </div>
          <div class="round-arrow ${better ? 'win' : 'lose'}">
            ${better ? '&#x2714;' : gloR.contradiction_count === isoR.contradiction_count ? '=' : '&#x2716;'}
          </div>
        </div>
        ${isoR.details.length > 0 ? `
          <div class="round-details">
            <div class="rd-label">隔离矛盾：</div>
            ${isoR.details.map(d => `<div class="rd-item bad">${h(d)}</div>`).join('')}
          </div>
        ` : ''}
        ${gloR.details.length > 0 ? `
          <div class="round-details">
            <div class="rd-label">预生成矛盾：</div>
            ${gloR.details.map(d => `<div class="rd-item bad">${h(d)}</div>`).join('')}
          </div>
        ` : ''}
      </div>
    `;
  });
  roundHTML += `</div>`;
  roundsEl.innerHTML = roundHTML;

  // 说明
  document.getElementById('note').classList.remove('hidden');
  document.getElementById('note').innerHTML = `
    <p><strong>检测方法说明</strong></p>
    <p>本次对比采用<b>确定性矛盾检测</b>，不依赖LLM评判：</p>
    <ul>
      <li>规则：同一NPC在<b>重叠时间段</b>出现在<b>不同地点</b></li>
      <li>数据来源：事件中的 <code>day_range</code>（最早天数→最晚天数）和 <code>related_locations</code></li>
      <li>共跑 ${data.rounds} 轮，每轮随机抽取 ${data.events_per_npc} 个NPC，各生成 ${data.events_per_npc} 个事件</li>
      <li>隔离模式是<b>对照组</b>（模拟实时生成），全局模式是<b>实验组</b>（模拟预生成）</li>
    </ul>
    <p style="margin-top:12px">本测试排除了LLM评判的随机性，结果可复现。</p>
  `;
}

function h(str){
  if(!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
