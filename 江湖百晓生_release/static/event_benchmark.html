<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>预生成三层评审 - 效果对比</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:#0a0a14;color:#c8c0b8;min-height:100vh}
.header{text-align:center;padding:32px 16px 24px}
.header h1{font-size:1.6em;color:#f0d78c;margin-bottom:8px}
.header p{color:#807060;font-size:.85em}

.container{max-width:1100px;margin:0 auto;padding:0 20px 60px}

/* 控制区 */
.controls{display:flex;gap:12px;align-items:center;justify-content:center;margin-bottom:32px;flex-wrap:wrap}
.controls select,.controls button{padding:10px 20px;border-radius:8px;font-size:.95em;cursor:pointer;border:1px solid #8a6d3b44;background:#141425;color:#c0b0a0;transition:all .3s}
.controls button{background:linear-gradient(135deg,#2a1f3a,#141425)}
.controls button:hover{background:linear-gradient(135deg,#3a2f4a,#241435);color:#f0d78c;border-color:#8a6d3b88}
.controls button:disabled{opacity:.4;cursor:not-allowed}
.controls .count-input{width:60px;text-align:center;padding:10px;border-radius:8px;border:1px solid #8a6d3b44;background:#141425;color:#c0b0a0;font-size:.95em}

/* 加载状态 */
#loading{display:none;text-align:center;padding:40px}
#loading.active{display:block}
.spinner{width:36px;height:36px;border:3px solid #8a6d3b33;border-top-color:#f0d78c;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* 总览卡片 */
.score-card{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:28px}
.score-card .card{background:#141425;border:1px solid #8a6d3b22;border-radius:12px;padding:18px 14px;text-align:center}
.card .num{font-size:2em;font-weight:bold;margin-bottom:4px}
.card .label{font-size:.8em;color:#706860}
.card.raw .num{color:#c06060}
.card.pass .num{color:#6ab06a}
.card.stage .num{color:#8a6d3b}

/* 管道流程图 */
.pipeline-flow{background:#141425;border:1px solid #8a6d3b22;border-radius:12px;padding:24px;margin-bottom:28px}
.pipeline-flow h3{color:#f0d78c;font-size:1.1em;margin-bottom:20px}
.flow-row{display:flex;align-items:center;justify-content:center;gap:0;flex-wrap:wrap}
.flow-node{background:#1a1025;border:1px solid #8a6d3b44;border-radius:12px;padding:14px 20px;text-align:center;min-width:120px}
.flow-node.pass{border-color:#4a8a4a66;background:#0d1a0d}
.flow-node.reject{border-color:#8a4a4a66;background:#1a0d0d}
.flow-node .node-title{font-size:.85em;color:#a09080;margin-bottom:6px}
.flow-node .node-count{font-size:1.4em;font-weight:bold;color:#f0d78c}
.flow-node.pass .node-count{color:#6ab06a}
.flow-node.reject .node-count{color:#c06060}
.flow-node .node-pct{font-size:.75em;color:#706860;margin-top:2px}
.flow-arrow{color:#8a6d3b66;font-size:1.4em;margin:0 8px;white-space:nowrap}

/* 对比双栏 */
.compare-section{margin-bottom:28px}
.compare-section h3{color:#f0d78c;font-size:1.1em;margin-bottom:16px}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:700px){.compare-grid{grid-template-columns:1fr}}
.compare-card{background:#141425;border:1px solid #8a6d3b22;border-radius:12px;padding:20px}
.compare-card.bad{border-color:#8a4a4a44;background:linear-gradient(180deg,#1a1010,#141425)}
.compare-card.good{border-color:#4a8a4a44;background:linear-gradient(180deg,#101a10,#141425)}
.compare-card h4{font-size:1em;margin-bottom:6px}
.compare-card h4 .icon{margin-right:6px}
.compare-card .subtitle{font-size:.78em;color:#706860;margin-bottom:14px}
.issue-list{list-style:none}
.issue-list li{padding:8px 0;border-bottom:1px solid #8a6d3b11;display:flex;align-items:flex-start;gap:8px;font-size:.88em}
.issue-list li:last-child{border-bottom:none}
.issue-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.75em;white-space:nowrap;flex-shrink:0;margin-top:2px}
.tag-red{background:#8a3a3a33;color:#e08080;border:1px solid #8a3a3a55}
.tag-yellow{background:#8a6d3b33;color:#d0b060;border:1px solid #8a6d3b55}
.tag-green{background:#3a6a3a33;color:#80c080;border:1px solid #3a6a3a55}

/* 被拒事件列表 */
.rejects-section{margin-bottom:28px}
.rejects-section h3{color:#f0d78c;font-size:1.1em;margin-bottom:16px}
.layer-group{margin-bottom:20px}
.layer-group h4{font-size:.95em;color:#a09080;margin-bottom:10px;padding-left:4px;border-left:3px solid #8a6d3b}
.layer-group h4.l1{border-color:#c06060}
.layer-group h4.l2{border-color:#d0b060}
.layer-group h4.l3{border-color:#6ab06a}
.reject-card{background:#141425;border:1px solid #8a6d3b22;border-radius:8px;padding:12px 16px;margin-bottom:8px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.reject-card .evt-title{font-weight:bold;color:#c8c0b8;min-width:120px}
.reject-card .evt-reason{color:#c06060;font-size:.85em;flex:1}
.reject-card .evt-npc{color:#706860;font-size:.78em}

/* 通过事件列表 */
.passed-section{margin-bottom:28px}
.passed-section h3{color:#f0d78c;font-size:1.1em;margin-bottom:16px}
.passed-card{background:#141425;border:1px solid #4a8a4a33;border-radius:8px;padding:12px 16px;margin-bottom:8px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.passed-card .evt-title{font-weight:bold;color:#c8c0b8;min-width:140px}
.passed-card .evt-score{color:#6ab06a;font-weight:bold;font-size:1em}
.passed-card .evt-npc{color:#706860;font-size:.78em}
.passed-card .evt-desc{color:#908880;font-size:.82em;flex:1}

/* 说明 */
.note{background:#141425;border:1px solid #8a6d3b22;border-radius:12px;padding:20px;font-size:.85em;color:#908880;line-height:1.8}

/* 数据为空 */
.empty{text-align:center;padding:40px;color:#706860;font-size:.9em}
</style>
</head>
<body>

<div class="header">
  <h1>预生成三层评审 - 效果对比</h1>
  <p>对比「LLM直出」与「预生成+Embedding+知识图谱+AI评审」的事件质量差异</p>
</div>

<div class="container">
  <!-- 控制区 -->
  <div class="controls">
    <select id="npcSelect"></select>
    <input type="number" class="count-input" id="countInput" value="10" min="5" max="30" title="生成事件数量">
    <button id="runBtn" onclick="runBenchmark()" disabled>运行对比</button>
  </div>

  <!-- 加载 -->
  <div id="loading"><div class="spinner"></div><p>正在生成事件并执行三层评审...</p></div>

  <!-- 总览 -->
  <div id="overview" style="display:none"></div>

  <!-- 管道流程图 -->
  <div id="pipeline" style="display:none"></div>

  <!-- 对比双栏 -->
  <div id="compare" style="display:none"></div>

  <!-- 被拒事件 -->
  <div id="rejects" style="display:none"></div>

  <!-- 通过事件 -->
  <div id="passed" style="display:none"></div>

  <!-- 说明 -->
  <div class="note" id="note" style="display:none"></div>
</div>

<script>
const API = '/api/events/benchmark';
let npcList = [];

// 预定义NPC列表（如果API获取失败用这个）
const DEFAULT_NPCS = ['风清扬','扫地僧','张三丰','任我行','洪七公','欧阳克','任盈盈','黄衫女',
  '瑛姑','店小二','神秘大侠','武林盟主','平一指'];

function init(){
  const sel = document.getElementById('npcSelect');
  DEFAULT_NPCS.forEach(n => {
    const opt = document.createElement('option');
    opt.value = n; opt.textContent = n;
    sel.appendChild(opt);
  });
  document.getElementById('runBtn').disabled = false;
}

function showLoading(v){
  const el = document.getElementById('loading');
  el.classList.toggle('active', v);
  document.getElementById('overview').style.display = v ? 'none' : '';
  document.getElementById('pipeline').style.display = v ? 'none' : '';
  document.getElementById('compare').style.display = v ? 'none' : '';
  document.getElementById('rejects').style.display = v ? 'none' : '';
  document.getElementById('passed').style.display = v ? 'none' : '';
  document.getElementById('note').style.display = v ? 'none' : '';
  document.getElementById('runBtn').disabled = v;
}

async function runBenchmark(){
  const npc = document.getElementById('npcSelect').value;
  if(!npc){ alert('请先选择一个NPC'); return; }
  showLoading(true);
  const count = parseInt(document.getElementById('countInput').value) || 10;
  try{
    const resp = await fetch(`${API}?npc=${encodeURIComponent(npc)}&count=${count}`);
    const data = await resp.json();
    if(data.error){ alert(data.error); showLoading(false); return; }
    render(data);
  }catch(e){
    alert('请求失败: ' + e.message);
  }
  showLoading(false);
}

function render(data){
  const d = data.diagnosis;
  const s = d.summary;

  // === 总览 ===
  document.getElementById('overview').style.display = '';
  document.getElementById('overview').innerHTML = `
    <div class="score-card">
      <div class="card raw">
        <div class="num" style="color:#c06060">${s.total}</div>
        <div class="label">LLM原始产出</div>
      </div>
      <div class="card stage">
        <div class="num">${s.layer1_embedding.passed}</div>
        <div class="label">通过第1层(Embedding)</div>
      </div>
      <div class="card stage">
        <div class="num">${s.layer2_kg.passed}</div>
        <div class="label">通过第2层(知识图谱)</div>
      </div>
      <div class="card stage">
        <div class="num">${s.layer3_review.passed}</div>
        <div class="label">通过第3层(AI评审)</div>
      </div>
      <div class="card pass">
        <div class="num">${s.final_pass}</div>
        <div class="label">最终采用率</div>
      </div>
    </div>
  `;

  // === 管道流程图 ===
  const rejected1 = s.layer1_embedding.rejected;
  const rejected2 = s.layer2_kg.rejected;
  const rejected3 = s.layer3_review.rejected;
  const pct1 = s.layer1_embedding.pass_rate;
  const pct2 = s.layer2_kg.pass_rate;
  const pct3 = s.layer3_review.pass_rate;

  document.getElementById('pipeline').style.display = '';
  document.getElementById('pipeline').innerHTML = `
    <div class="pipeline-flow">
      <h3>事件过滤管道</h3>
      <div class="flow-row">
        <div class="flow-node">
          <div class="node-title">LLM原始产出</div>
          <div class="node-count" style="color:#c06060">${s.total}</div>
        </div>
        <div class="flow-arrow">→</div>
        <div class="flow-node ${rejected1 ? 'reject' : 'pass'}">
          <div class="node-title">第1层: Embedding粗筛</div>
          <div class="node-count">${s.layer1_embedding.passed}</div>
          <div class="node-pct">${pct1}</div>
          ${rejected1 ? `<div style="font-size:.75em;color:#c06060;margin-top:4px">拦截${rejected1}条</div>` : ''}
        </div>
        <div class="flow-arrow">→</div>
        <div class="flow-node ${rejected2 ? 'reject' : 'pass'}">
          <div class="node-title">第2层: 知识图谱</div>
          <div class="node-count">${s.layer2_kg.passed}</div>
          <div class="node-pct">${pct2}</div>
          ${rejected2 ? `<div style="font-size:.75em;color:#c06060;margin-top:4px">拦截${rejected2}条</div>` : ''}
        </div>
        <div class="flow-arrow">→</div>
        <div class="flow-node ${rejected3 ? 'reject' : 'pass'}">
          <div class="node-title">第3层: AI评审团</div>
          <div class="node-count">${s.layer3_review.passed}</div>
          <div class="node-pct">${pct3}</div>
          ${rejected3 ? `<div style="font-size:.75em;color:#c06060;margin-top:4px">拦截${rejected3}条</div>` : ''}
        </div>
        <div class="flow-arrow">→</div>
        <div class="flow-node pass">
          <div class="node-title">注入游戏世界</div>
          <div class="node-count" style="font-size:1em">${s.layer3_review.passed} 条高品质事件</div>
        </div>
      </div>
    </div>
  `;

  // === 对比双栏 ===
  const totalRejected = s.total - s.layer3_review.passed;
  const rejectTypes = [];
  if(d.rejects_sample.layer1_embedding.length) rejectTypes.push(`${d.rejects_sample.layer1_embedding.length}条语义/格式问题`);
  if(d.rejects_sample.layer2_kg.length) rejectTypes.push(`${d.rejects_sample.layer2_kg.length}条NPC/地点不存在`);
  if(d.rejects_sample.layer3_review.length) rejectTypes.push(`${d.rejects_sample.layer3_review.length}条评分过低/矛盾`);

  const badIssues = [
    ...(d.rejects_sample.layer1_embedding.length ? [`<li><span class="issue-tag tag-red">格式/语义</span>包含现代词汇、太短或太长，破坏武侠沉浸感</li>`] : []),
    ...(d.rejects_sample.layer2_kg.length ? [`<li><span class="issue-tag tag-yellow">NPC不存在</span>引用不在知识图谱中的NPC/地点，破坏世界一致性</li>`] : []),
    ...(d.rejects_sample.layer3_review.length ? [`<li><span class="issue-tag tag-red">矛盾/低质</span>AI评审检测出与历史事件矛盾或叙事质量不达标</li>`] : []),
  ];
  if(totalRejected && badIssues.length === 0) {
    badIssues.push(`<li><span class="issue-tag tag-yellow">质量隐患</span>${totalRejected}条事件未通过审查，直接注入游戏可能导致体验劣化</li>`);
  }

  document.getElementById('compare').style.display = '';
  document.getElementById('compare').innerHTML = `
    <div class="compare-section">
      <h3>传统做法 vs 预生成三层评审</h3>
      <div class="compare-grid">
        <div class="compare-card bad">
          <h4><span class="icon">&#x26A0;</span>传统 LLM 直出</h4>
          <div class="subtitle">事件不经审查直接注入游戏</div>
          <ul class="issue-list">
            ${badIssues.join('\n')}
            <li><span class="issue-tag tag-red">0%过滤</span>${s.total}条事件全部进入游戏，无法保证质量</li>
          </ul>
        </div>
        <div class="compare-card good">
          <h4><span class="icon">&#x2705;</span>预生成 + 三层评审</h4>
          <div class="subtitle">离线预生成，逐层过滤后才注入</div>
          <ul class="issue-list">
            <li><span class="issue-tag tag-green">语义过滤</span>自动拦截现代词汇和格式异常事件</li>
            <li><span class="issue-tag tag-green">知识图谱校验</span>确保NPC和地点都在世界观定义内</li>
            <li><span class="issue-tag tag-green">AI评审评分</span>4维度评审(合理性/戏剧性/一致性/趣味性) + 矛盾检测</li>
            <li><span class="issue-tag tag-green">${s.final_pass}</span>只有${s.layer3_review.passed}条通过全部审查进入游戏</li>
          </ul>
        </div>
      </div>
    </div>
  `;

  // === 被拒事件 ===
  let rejectsHTML = '<div class="rejects-section"><h3>被拦截的问题事件（每条都有具体原因）</h3>';

  if(d.rejects_sample.layer1_embedding.length){
    rejectsHTML += '<div class="layer-group"><h4 class="l1">第1层拦截: Embedding粗筛 - 格式/语义异常</h4>';
    d.rejects_sample.layer1_embedding.forEach(r => {
      rejectsHTML += `<div class="reject-card"><span class="evt-title">${h(r.title||'无标题')}</span><span class="evt-reason">${h(r.reason)}</span></div>`;
    });
    rejectsHTML += '</div>';
  }

  if(d.rejects_sample.layer2_kg.length){
    rejectsHTML += '<div class="layer-group"><h4 class="l2">第2层拦截: 知识图谱 - NPC/地点不存在或关系矛盾</h4>';
    d.rejects_sample.layer2_kg.forEach(r => {
      rejectsHTML += `<div class="reject-card"><span class="evt-title">${h(r.title||'无标题')}</span><span class="evt-npc">${h(r.from_npc||'')}</span><span class="evt-reason">${h(r.reason)}</span></div>`;
    });
    rejectsHTML += '</div>';
  }

  if(d.rejects_sample.layer3_review.length){
    rejectsHTML += '<div class="layer-group"><h4 class="l3">第3层拦截: AI评审团 - 评分<5分或矛盾</h4>';
    d.rejects_sample.layer3_review.forEach(r => {
      rejectsHTML += `<div class="reject-card"><span class="evt-title">${h(r.title||'无标题')}</span><span class="evt-npc">${h(r.from_npc||'')}</span><span class="evt-reason">得分 ${r.score}/10 - 未通过</span></div>`;
    });
    rejectsHTML += '</div>';
  }

  if(!d.rejects_sample.layer1_embedding.length && !d.rejects_sample.layer2_kg.length && !d.rejects_sample.layer3_review.length){
    rejectsHTML += '<div class="empty">该NPC的事件全部通过三层审查，未发现质量问题</div>';
  }

  rejectsHTML += '</div>';
  document.getElementById('rejects').style.display = '';
  document.getElementById('rejects').innerHTML = rejectsHTML;

  // === 通过事件 ===
  let passedHTML = '<div class="passed-section"><h3>通过全部审查的优质事件</h3>';
  if(d.passed_sample.length){
    d.passed_sample.forEach(e => {
      passedHTML += `<div class="passed-card"><span class="evt-title">${h(e.title)}</span><span class="evt-score">${e.quality_score}/10</span><span class="evt-npc">${h(e.from_npc)}</span><span class="evt-desc">${h(e.description)}</span></div>`;
    });
  }else{
    passedHTML += '<div class="empty">无事件通过全部三层审查</div>';
  }
  passedHTML += '</div>';
  document.getElementById('passed').style.display = '';
  document.getElementById('passed').innerHTML = passedHTML;

  // === 说明 ===
  document.getElementById('note').style.display = '';
  document.getElementById('note').innerHTML = `
    <p><strong>NPC:</strong> ${h(data.npc)} (动机: ${h(data.npc_profile.drive)} | 心情: ${h(data.npc_profile.mood)} | 目标: ${h(data.npc_profile.goal)})</p>
    <p>耗时: ${data.elapsed_sec}秒 | ${data.interpretation.without_review}</p>
    <p>${data.interpretation.with_review}</p>
  `;
}

function h(str){
  if(!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// 初始化
init();
</script>
</body>
</html>
