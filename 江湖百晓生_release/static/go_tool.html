<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>围棋分析工具 - 江湖百晓生</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a1a;color:#ddd;font-family:sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
h1{color:#d4a853;margin-bottom:8px;font-size:1.3em}
.sub{color:#888;font-size:.85em;margin-bottom:20px}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:15px;justify-content:center}
.toolbar label{color:#aaa;font-size:.85em}
.toolbar select,.toolbar button{padding:6px 12px;border-radius:6px;border:1px solid #444;background:#2a2a2a;color:#ddd;font-size:.85em;cursor:pointer}
.toolbar button{background:#d4a853;color:#0A0806;font-weight:600;border:none}
.toolbar button:hover{opacity:.85}
.toolbar button:disabled{opacity:.5;cursor:not-allowed}
.board-wrap{background:#dcb35c;border-radius:8px;padding:15px;display:inline-block}
.board-wrap svg{display:block}
.info-wrap{display:flex;gap:20px;margin-top:15px;flex-wrap:wrap;justify-content:center;max-width:900px;width:100%}
.analysis{background:#2a2a2a;border-radius:8px;padding:12px;min-width:240px;flex:1}
.analysis h3{color:#d4a853;font-size:.9em;margin-bottom:8px}
.analysis table{width:100%;border-collapse:collapse;font-size:.8em}
.analysis th,.analysis td{padding:5px 8px;text-align:left;border-bottom:1px solid #444;white-space:nowrap}
.analysis th{color:#888;font-weight:400}
.analysis tr{cursor:pointer}
.analysis tr:hover{background:#333}
.analysis tr.active{background:#3a3020}
.move-list{background:#2a2a2a;border-radius:8px;padding:12px;min-width:140px;max-height:220px;overflow-y:auto}
.move-list h3{color:#d4a853;font-size:.9em;margin-bottom:8px}
.move-list .move-item{padding:2px 4px;font-size:.8em;cursor:pointer;border-radius:3px}
.move-list .move-item:hover{background:#444}
.pv-notes{background:#2a2a2a;border-radius:8px;padding:12px;min-width:200px;flex:1}
.pv-notes h3{color:#d4a853;font-size:.9em;margin-bottom:8px}
.pv-notes .note-item{font-size:.8em;padding:3px 0;border-bottom:1px solid #333;color:#bbb}
.pv-notes .note-item:last-child{border-bottom:none}
.status{color:#888;font-size:.8em;margin-top:10px;text-align:center}
</style>
</head>
<body>
<h1>围棋分析工具</h1>
<div class="sub">选好颜色自由摆子 · 右键移除棋子 · 选"黑先/白先"后点AI分析出最优解</div>

<div class="toolbar">
  <label>棋盘: <select id="boardSize"><option value="9">9路</option><option value="13">13路</option><option value="19" selected>19路</option></select></label>
  <label>落子: <select id="curColor"><option value="B">⚫ 黑</option><option value="W">⚪ 白</option></select></label>
  <label>先手: <select id="turnColor"><option value="B">黑先</option><option value="W">白先</option></select></label>
  <button id="btnClear">清空棋盘</button>
  <button id="btnUndo">悔棋</button>
  <button id="btnAnalyze">AI分析</button>
  <button id="btnAutoSolve">自动求解</button>
</div>

<div class="board-wrap">
  <svg id="board" width="660" height="660"></svg>
</div>

<div class="info-wrap">
  <div class="analysis" id="analysisPanel">
    <h3>KataGo 推荐</h3>
    <table><thead><tr><th>#</th><th>位置</th><th>胜率</th><th>访问量</th></tr></thead>
    <tbody id="analysisBody"><tr><td colspan="4" style="color:#666;text-align:center">点击"AI分析"获取推荐</td></tr></tbody></table>
  </div>
  <div class="move-list">
    <h3>落子记录</h3>
    <div id="moveList"></div>
  </div>
  <div class="pv-notes" id="pvNotesPanel" style="display:none">
    <h3>变化图备注</h3>
    <div id="pvNotes"></div>
  </div>
</div>

<div class="status" id="status">就绪 — 点击棋盘落子，点"AI分析"查看KataGo推荐</div>

<script>
const COL = "ABCDEFGHJKLMNOPQRST";
let boardSize = 19;
let board = [];
let moves = [];
let analysisResults = [];
let selectedPvIndex = -1;      // 当前选中的推荐索引
let displayedPvMoves = [];     // 当前显示在棋盘上的PV序列
let pvCaptureNotes = [];       // 提子备注

const boardEl = document.getElementById("board");

function initBoard() {
  board = Array.from({length: boardSize}, () => Array(boardSize).fill(""));
  moves = [];
  analysisResults = [];
  selectedPvIndex = -1;
  displayedPvMoves = [];
  pvCaptureNotes = [];
  renderBoard();
  renderMoves();
  renderAnalysis();
  document.getElementById("pvNotesPanel").style.display = "none";
  document.getElementById("status").textContent = `棋盘已清空 (${boardSize}路)`;
}

function renderBoard() {
  const gridSize = boardSize;
  const cellSize = 640 / (gridSize + 1);
  const margin = cellSize;
  const innerSize = (gridSize - 1) * cellSize;
  const totalSize = margin * 2 + innerSize;

  let html = `<rect width="${totalSize}" height="${totalSize}" fill="#dcb35c" rx="4"/>`;

  // 网格线
  for (let i = 0; i < gridSize; i++) {
    const p = margin + i * cellSize;
    html += `<line x1="${p}" y1="${margin}" x2="${p}" y2="${totalSize - margin}" stroke="#555" stroke-width="1"/>`;
    html += `<line x1="${margin}" y1="${p}" x2="${totalSize - margin}" y2="${p}" stroke="#555" stroke-width="1"/>`;
  }

  // 星位
  const starPoints = gridSize === 9 ? [[2,2],[2,6],[6,2],[6,6],[4,4]]
    : gridSize === 13 ? [[3,3],[3,9],[9,3],[9,9],[6,6]]
    : [[3,3],[3,9],[9,3],[9,9],[3,15],[9,15],[15,3],[15,9],[15,15]];
  for (const [x, y] of starPoints) {
    if (x < gridSize && y < gridSize) {
      html += `<circle cx="${margin + x * cellSize}" cy="${margin + y * cellSize}" r="${Math.max(4, cellSize * 0.06)}" fill="#555"/>`;
    }
  }

  // 坐标标签
  for (let i = 0; i < gridSize; i++) {
    html += `<text x="${margin + i * cellSize}" y="${margin - 8}" text-anchor="middle" fill="#666" font-size="11">${COL[i]}</text>`;
    html += `<text x="${margin - 14}" y="${margin + i * cellSize + 4}" text-anchor="middle" fill="#666" font-size="11">${gridSize - i}</text>`;
  }

  // 已有棋子
  for (let r = 0; r < gridSize; r++) {
    for (let c = 0; c < gridSize; c++) {
      if (board[r][c]) {
        const cx = margin + c * cellSize;
        const cy = margin + r * cellSize;
        const isB = board[r][c] === "B";
        html += `<circle cx="${cx}" cy="${cy}" r="${cellSize * 0.44}" fill="${isB ? '#222' : '#fff'}" stroke="${isB ? '#111' : '#ccc'}" stroke-width="1.5" data-col="${c}" data-row="${r}" style="cursor:pointer"/>`;
        // 最后一手标记
        if (moves.length > 0) {
          const last = moves[moves.length - 1];
          if (last.col === c && last.row === r) {
            html += `<circle cx="${cx}" cy="${cy}" r="${cellSize * 0.15}" fill="#f44" opacity="0.8"/>`;
          }
        }
      }
    }
  }

  // ── 推荐走法标记（金色三角/星标，直接在棋盘上显示） ──
  // 不依赖 selectedPvIndex，分析完成后自动显示
  for (let aiIdx = 0; aiIdx < Math.min(analysisResults.length, 5); aiIdx++) {
    const rec = analysisResults[aiIdx];
    if (!rec || !rec.coord) continue;
    const colLetter = rec.coord[0].toUpperCase();
    const rowNum = parseInt(rec.coord.slice(1));
    const col = COL.indexOf(colLetter);
    const row = gridSize - rowNum;
    const cx = margin + col * cellSize;
    const cy = margin + row * cellSize;
    // 金色星标 + 字母 A/B/C/D/E
    const letter = String.fromCharCode(65 + aiIdx); // A,B,C,D,E
    const isHighlighted = aiIdx === selectedPvIndex;
    html += `<circle cx="${cx}" cy="${cy}" r="${cellSize * 0.38}" fill="none" stroke="${isHighlighted ? '#ff4444' : '#ffd700'}" stroke-width="${isHighlighted ? 3 : 2}" opacity="${isHighlighted ? 1 : 0.8}" stroke-dasharray="${isHighlighted ? '' : '3,2'}"/>`;
    html += `<text x="${cx}" y="${cy + cellSize * 0.15}" text-anchor="middle" fill="${isHighlighted ? '#ff4444' : '#ffd700'}" font-size="${Math.max(10, cellSize * 0.3)}" font-weight="700" style="pointer-events:none">${letter}</text>`;
  }

  // ── PV 变化图棋子（叠加层） ──
  if (selectedPvIndex >= 0) {
    for (const pv of displayedPvMoves) {
      const cx = margin + pv.col * cellSize;
      const cy = margin + pv.row * cellSize;
      const isB = pv.color === "B";
      // PV棋子用半透明虚线边框
      html += `<circle cx="${cx}" cy="${cy}" r="${cellSize * 0.40}" fill="${isB ? '#222' : '#fff'}" stroke="${isB ? '#d4a853' : '#d4a853'}" stroke-width="2" stroke-dasharray="4,2" opacity="0.95"/>`;
      const textColor = isB ? '#fff' : '#222';
      const fontSize = Math.max(10, cellSize * 0.35);
      html += `<text x="${cx}" y="${cy + fontSize * 0.35}" text-anchor="middle" fill="${textColor}" font-size="${fontSize}" font-weight="700" style="pointer-events:none">${pv.step}</text>`;
    }
  }

  // 透明点击区域
  for (let r = 0; r < gridSize; r++) {
    for (let c = 0; c < gridSize; c++) {
      if (board[r][c]) continue;
      const isPv = displayedPvMoves.some(pv => pv.col === c && pv.row === r);
      if (isPv) continue;
      const isRec = analysisResults.some((rec, i) => {
        if (!rec || !rec.coord) return false;
        const cl = rec.coord[0].toUpperCase();
        const rn = parseInt(rec.coord.slice(1));
        return COL.indexOf(cl) === c && (gridSize - rn) === r;
      });
      if (isRec) continue;
      const cx = margin + c * cellSize;
      const cy = margin + r * cellSize;
      html += `<circle cx="${cx}" cy="${cy}" r="${cellSize * 0.44}" fill="transparent" style="cursor:pointer" data-col="${c}" data-row="${r}"/>`;
    }
  }

  boardEl.innerHTML = html;

  boardEl.querySelectorAll("[data-col]").forEach(el => {
    el.addEventListener("click", () => {
      const col = parseInt(el.dataset.col);
      const row = parseInt(el.dataset.row);
      if (board[row][col]) {
        removeStone(col, row);
      } else {
        placeStone(col, row);
      }
    });
    el.addEventListener("contextmenu", (e) => {
      e.preventDefault();
      const col = parseInt(el.dataset.col);
      const row = parseInt(el.dataset.row);
      if (board[row][col]) removeStone(col, row);
    });
  });
}

// ===== 围棋提子逻辑 =====

function getBlockAndLiberties(boardState, size, startCol, startRow, color) {
  const block = [];
  const liberties = new Set();
  const visited = new Set();
  const stack = [[startCol, startRow]];
  while (stack.length > 0) {
    const [c, r] = stack.pop();
    const key = `${c},${r}`;
    if (visited.has(key)) continue;
    visited.add(key);
    block.push([c, r]);
    for (const [nc, nr] of [[c-1,r],[c+1,r],[c,r-1],[c,r+1]]) {
      if (nc < 0 || nc >= size || nr < 0 || nr >= size) continue;
      if (boardState[nr][nc] === color) {
        stack.push([nc, nr]);
      } else if (boardState[nr][nc] === "") {
        liberties.add(`${nc},${nr}`);
      }
    }
  }
  return { block, liberties: liberties.size };
}

function placeStone(col, row) {
  if (board[row][col]) return;
  const color = document.getElementById("curColor").value;
  const oppColor = color === "B" ? "W" : "B";
  board[row][col] = color;
  const captured = [];
  for (const [nc, nr] of [[col-1,row],[col+1,row],[col,row-1],[col,row+1]]) {
    if (nc < 0 || nc >= boardSize || nr < 0 || nr >= boardSize) continue;
    if (board[nr][nc] === oppColor) {
      const { block, liberties } = getBlockAndLiberties(board, boardSize, nc, nr, oppColor);
      if (liberties === 0) captured.push(...block);
    }
  }
  for (const [c, r] of captured) {
    board[r][c] = "";
    const idx = moves.findIndex(m => m.col === c && m.row === r);
    if (idx >= 0) moves.splice(idx, 1);
  }
  const { liberties: selfLiberties } = getBlockAndLiberties(board, boardSize, col, row, color);
  if (selfLiberties === 0 && captured.length === 0) {
    board[row][col] = "";
    document.getElementById("status").textContent = `落子 ${COL[col]}${boardSize - row} 是自杀，禁止！`;
    return;
  }
  moves.push({col, row, color});
  clearPvDisplay();
  renderBoard();
  renderMoves();
  renderAnalysis();
  const coord = `${COL[col]}${boardSize - row}`;
  let msg = `落子 ${coord} · ${color === 'B' ? '黑' : '白'}棋`;
  if (captured.length > 0) msg += ` · 提掉 ${captured.length} 子`;
  document.getElementById("status").textContent = msg;
}

function removeStone(col, row) {
  if (!board[row][col]) return;
  board[row][col] = "";
  const idx = moves.findIndex(m => m.col === col && m.row === row);
  if (idx >= 0) moves.splice(idx, 1);
  clearPvDisplay();
  renderBoard();
  renderMoves();
  renderAnalysis();
  document.getElementById("status").textContent = `移除 ${COL[col]}${boardSize - row}`;
}

function undoMove() {
  if (moves.length === 0) return;
  const last = moves.pop();
  board[last.row][last.col] = "";
  clearPvDisplay();
  renderBoard();
  renderMoves();
  renderAnalysis();
  document.getElementById("status").textContent = "已悔棋";
}

function clearPvDisplay() {
  selectedPvIndex = -1;
  displayedPvMoves = [];
  pvCaptureNotes = [];
  document.getElementById("pvNotesPanel").style.display = "none";
}

// ===== AI 分析 =====

async function analyze() {
  const btn = document.getElementById("btnAnalyze");
  btn.disabled = true;
  btn.textContent = "分析中...";
  document.getElementById("status").textContent = "KataGo 分析中，请稍候...";

  // 收集棋盘上的棋子，翻转 row 传给后端
  // 前端 row=0 是顶部（标签 boardSize），后端 _gtp_str 用 row+1（row=0 是底部）
  // 所以翻转：flippedRow = boardSize - 1 - frontRow
  const stonesB = [];
  const stonesW = [];
  for (let r = 0; r < boardSize; r++) {
    for (let c = 0; c < boardSize; c++) {
      const flippedRow = boardSize - 1 - r;
      if (board[r][c] === "B") stonesB.push(`${c},${flippedRow}`);
      else if (board[r][c] === "W") stonesW.push(`${c},${flippedRow}`);
    }
  }

  const color = document.getElementById("turnColor").value;

  try {
    const body = JSON.stringify({
      stones_b: stonesB,
      stones_w: stonesW,
      board_size: boardSize,
      color: color,
      moves: 5,
    });

    const resp = await fetch("/api/go/analyze", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: body,
    });
    const data = await resp.json();
    analysisResults = data || [];
    selectedPvIndex = -1;
    displayedPvMoves = [];
    pvCaptureNotes = [];
    renderBoard();       // 棋盘直接显示推荐标记
    renderAnalysis();
    document.getElementById("pvNotesPanel").style.display = "none";

    if (analysisResults.length > 0) {
      const top = analysisResults[0];
      document.getElementById("status").textContent = `推荐: ${top.coord} · 胜率 ${(top.winrate * 100).toFixed(1)}% · 访问 ${top.visits}次`;
    } else {
      document.getElementById("status").textContent = "分析完成，未获得推荐走法";
    }
  } catch (e) {
    document.getElementById("status").textContent = "分析失败: " + e.message;
  }

  btn.disabled = false;
  btn.textContent = "AI分析";
}

// ===== 自动求解 =====

async function autoSolve() {
  const btn = document.getElementById("btnAutoSolve");
  btn.disabled = true;
  btn.textContent = "求解中...";
  document.getElementById("status").textContent = "KataGo 自动求解中，请稍候...";

  // 收集棋盘棋子（与 analyze 相同坐标格式）
  const stonesB = [];
  const stonesW = [];
  for (let r = 0; r < boardSize; r++) {
    for (let c = 0; c < boardSize; c++) {
      const flippedRow = boardSize - 1 - r;
      if (board[r][c] === "B") stonesB.push(`${c},${flippedRow}`);
      else if (board[r][c] === "W") stonesW.push(`${c},${flippedRow}`);
    }
  }

  const color = document.getElementById("turnColor").value;

  try {
    const resp = await fetch("/api/go/auto-solve", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        stones_b: stonesB,
        stones_w: stonesW,
        board_size: boardSize,
        player_color: color,
        max_moves: 50,
      }),
    });
    const data = await resp.json();

    // 应用所有走法到棋盘
    for (const mv of data.moves || []) {
      const colLetter = mv.coord[0].toUpperCase();
      const rowNum = parseInt(mv.coord.slice(1));
      const col = COL.indexOf(colLetter);
      const row = boardSize - rowNum;  // GTP row → 前端 row
      if (col >= 0 && col < boardSize && row >= 0 && row < boardSize) {
        board[row][col] = mv.color;
        moves.push({col, row, color: mv.color});
        // 简化提子（显示用）
        if (mv.captures > 0) {
          // 粗略清理：不实现完整提子逻辑，直接信任 KataGo
        }
      }
    }

    // 用返回的棋盘覆盖（保证精确）
    if (data.board && data.board.length > 0) {
      for (let r = 0; r < boardSize; r++) {
        for (let c = 0; c < boardSize; c++) {
          board[r][c] = data.board[r] ? (data.board[r][c] || "") : "";
        }
      }
    }

    clearPvDisplay();
    renderBoard();
    renderMoves();
    renderAnalysis();

    const moveCount = (data.moves || []).length;
    if (data.result === "alive") {
      document.getElementById("status").textContent = `${moveCount}手后${data.summary}`;
    } else if (data.result === "dead") {
      document.getElementById("status").textContent = `未活 ${data.summary}`;
    } else {
      document.getElementById("status").textContent = data.summary || "求解完成";
    }
  } catch (e) {
    document.getElementById("status").textContent = "求解失败: " + e.message;
  }

  btn.disabled = false;
  btn.textContent = "自动求解";
}

// ===== PV 变化图 =====

function gtpToRowCol(gtp, size) {
  const colLetter = gtp[0].toUpperCase();
  const rowNum = parseInt(gtp.slice(1));
  const col = COL.indexOf(colLetter);
  const row = size - rowNum;
  return { col, row };
}

function simulatePv(pvList, firstColor, size) {
  const sim = board.map(row => row.slice());
  const pvMoves = [];
  const captureNotes = [];
  let currentColor = firstColor;

  for (let i = 0; i < pvList.length; i++) {
    const gtp = pvList[i];
    if (!gtp || gtp.toUpperCase() === "PASS") {
      currentColor = currentColor === "B" ? "W" : "B";
      continue;
    }
    const { col, row } = gtpToRowCol(gtp, size);
    if (col < 0 || col >= size || row < 0 || row >= size) {
      currentColor = currentColor === "B" ? "W" : "B";
      continue;
    }

    if (sim[row][col] === currentColor) {
      currentColor = currentColor === "B" ? "W" : "B";
      continue;
    }

    const oppColor = currentColor === "B" ? "W" : "B";
    let capturedStepInfo = null;
    if (sim[row][col] === oppColor) {
      const moveIdx = moves.findIndex(m => m.col === col && m.row === row);
      if (moveIdx >= 0) {
        capturedStepInfo = { step: moveIdx + 1, color: oppColor };
      } else {
        const pvIdx = pvMoves.findIndex(m => m.col === col && m.row === row);
        if (pvIdx >= 0) {
          capturedStepInfo = { step: pvMoves[pvIdx].step, color: oppColor };
        }
      }
    }

    sim[row][col] = currentColor;

    const captured = [];
    for (const [nc, nr] of [[col-1,row],[col+1,row],[col,row-1],[col,row+1]]) {
      if (nc < 0 || nc >= size || nr < 0 || nr >= size) continue;
      if (sim[nr][nc] === oppColor) {
        const { block, liberties } = getBlockAndLiberties(sim, size, nc, nr, oppColor);
        if (liberties === 0) captured.push(...block);
      }
    }

    for (const [c, r] of captured) {
      sim[r][c] = "";
      const moveIdx = moves.findIndex(m => m.col === c && m.row === r);
      const refStep = moveIdx >= 0 ? moveIdx + 1 : null;
      if (refStep !== null) {
        captureNotes.push({ step: i + 1, color: currentColor, capturedStep: refStep, capturedColor: oppColor, coord: `${COL[col]}${size - row}`, capturedCoord: `${COL[c]}${size - r}` });
      } else {
        const pvIdx = pvMoves.findIndex(m => m.col === c && m.row === r);
        if (pvIdx >= 0) {
          captureNotes.push({ step: i + 1, color: currentColor, capturedStep: pvMoves[pvIdx].step, capturedColor: oppColor, coord: `${COL[col]}${size - row}`, capturedCoord: `${COL[c]}${size - r}` });
        }
      }
    }

    const { liberties: selfLiberties } = getBlockAndLiberties(sim, size, col, row, currentColor);
    if (selfLiberties === 0 && captured.length === 0) {
      sim[row][col] = capturedStepInfo ? oppColor : "";
      currentColor = currentColor === "B" ? "W" : "B";
      continue;
    }

    pvMoves.push({ step: i + 1, col, row, color: currentColor, gtp });

    if (capturedStepInfo && captured.length === 0) {
      captureNotes.push({ step: i + 1, color: currentColor, capturedStep: capturedStepInfo.step, capturedColor: oppColor, coord: `${COL[col]}${size - row}`, capturedCoord: `${COL[col]}${size - row}` });
    }

    currentColor = currentColor === "B" ? "W" : "B";
  }

  return { pvMoves, captureNotes };
}

function selectPv(index) {
  selectedPvIndex = index;
  displayedPvMoves = [];
  pvCaptureNotes = [];

  if (index < 0 || index >= analysisResults.length) {
    renderBoard();
    renderAnalysis();
    document.getElementById("pvNotesPanel").style.display = "none";
    return;
  }

  const result = analysisResults[index];
  const pvList = result.pv || [];
  const firstColor = document.getElementById("turnColor").value;

  const sim = simulatePv(pvList, firstColor, boardSize);
  displayedPvMoves = sim.pvMoves;
  pvCaptureNotes = sim.captureNotes;

  renderBoard();        // 重绘棋盘（推荐标记 + PV棋子）
  renderAnalysis();

  const notesEl = document.getElementById("pvNotes");
  if (pvCaptureNotes.length > 0) {
    document.getElementById("pvNotesPanel").style.display = "block";
    notesEl.innerHTML = pvCaptureNotes.map(n => {
      const capSym = n.capturedColor === "B" ? "⚫" : "⚪";
      const curSym = n.color === "B" ? "⚫" : "⚪";
      return `<div class="note-item">${curSym}${n.step} = ${capSym}${n.capturedStep} · ${n.coord}提${n.capturedCoord}</div>`;
    }).join("");
  } else {
    document.getElementById("pvNotesPanel").style.display = "none";
  }

  const status = `变化图: ${result.coord} · ${pvList.slice(0, 5).join("→")}${pvList.length > 5 ? "..." : ""}`;
  document.getElementById("status").textContent = status;
}

function renderAnalysis() {
  const tbody = document.getElementById("analysisBody");
  if (!analysisResults || analysisResults.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" style="color:#666;text-align:center">点击"AI分析"获取推荐</td></tr>';
    return;
  }
  tbody.innerHTML = analysisResults.map((r, i) => {
    const activeClass = i === selectedPvIndex ? "active" : "";
    return `<tr class="${activeClass}" onclick="selectPv(${i})"><td>${i + 1}</td><td>${r.coord}</td><td>${(r.winrate * 100).toFixed(1)}%</td><td>${r.visits}</td></tr>`;
  }).join("");
}

function renderMoves() {
  const list = document.getElementById("moveList");
  list.innerHTML = moves.map((m, i) =>
    `<div class="move-item">${i + 1}. ${m.color === "B" ? "⚫" : "⚪"} ${COL[m.col]}${boardSize - m.row}</div>`
  ).join("");
  list.scrollTop = list.scrollHeight;
}

// 事件绑定
document.getElementById("boardSize").addEventListener("change", function() {
  boardSize = parseInt(this.value);
  initBoard();
});
document.getElementById("btnClear").addEventListener("click", initBoard);
document.getElementById("btnUndo").addEventListener("click", undoMove);
document.getElementById("btnAnalyze").addEventListener("click", analyze);
document.getElementById("btnAutoSolve").addEventListener("click", autoSolve);

initBoard();
</script>
</body>
</html>
